<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- OPTICAL-CENTERING CANDIDATE of icon-maskable.svg (letterform identical,
       position only). Same optical correction as icon-optical.svg (+3.5 right,
       -2 up vs the bbox-centred master, i.e. inner translate(0 17.5)), applied
       innermost, then scaled 0.9 about the icon centre (256,256). Farthest ink
       point ~127px from centre, well inside the safe circle (r = 40% = 205px).
       Background stays full-bleed flat orange for the platform mask. -->

